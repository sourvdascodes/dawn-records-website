        <div style="border: 2px solid white;" style="border-radius: 5px;">
           <h1 style="text-align: center;">Query Form:-</h1>
           <div style="padding: 20px;">
            <form enctype="multipart/form-data" style="text-align: left;">
            Name:
            <input type="text"><br>
            Age:
            <input type="text"><br>
            Contact:
            <input type="text"><br>

            Class:
            <input type="checkbox" value="Weekly">Weekly
            <input type="checkbox" value="Weekend">Weekend
            <br><br> 
            Sidenote:
            <textarea name="text" rows="10" cols="30" placeholder="Any Opinion">
            </textarea><br>
            Video:
            <input type="file"><br><br>
            <input type="image" src="dawn-records-logo.png" width="50px" height="50px" style="border-radius: 50%;">

        </div>
